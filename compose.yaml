services:
  gateway:
    build:
      context: .
    container_name: newapi-epay-gateway
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./secrets:/run/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - epay

  db:
    image: mariadb:11.4
    container_name: newapi-epay-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: epay_gateway
      MARIADB_USER: epay_gateway
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - epay_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - epay

volumes:
  epay_db_data:

networks:
  epay:
    driver: bridge
